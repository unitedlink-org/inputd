<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Input Device Management</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #f0f2f5; min-height: 100vh; display: flex;
       flex-direction: column; align-items: center; padding: 40px 16px; }
h1  { font-size: 1.6em; color: #1a1a2e; margin-bottom: 28px; font-weight: 700; letter-spacing: -.01em; }
#app { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 960px; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
        padding: 22px 26px; width: 100%; max-width: 440px; flex: 1; min-width: 300px;
        border-top: 5px solid transparent; }
.card-primary_input { border-top-color: #ff9800; }
.card-secondary_input { border-top-color: #2196f3; }
.card-top { display: flex; align-items: center; justify-content: space-between; }
.role-label { font-size: .82em; font-weight: 700; letter-spacing: .07em;
              text-transform: uppercase; color: #666; }
.dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.dot-online   { background: #4caf50; }
.dot-offline  { background: #f44336; }
.dot-learning { background: #1976d2; animation: pulse 1s infinite; }
.dot-none     { background: #bdbdbd; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.device-name { font-size: 1.1em; font-weight: 700; color: #1a1a2e; margin-top: 12px; }
.device-path { font-size: .88em; color: #777; font-family: monospace; margin-top: 4px; }
.unassigned-text { color: #ff9800; font-size: 1.05em; font-weight: 600; margin-top: 12px; }
.card-action { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
       font-size: 1em; font-weight: 600; transition: background .15s; }
.btn-bind    { background: #1976d2; color: #fff; }
.btn-bind:hover { background: #1565c0; }
.btn-bind:disabled { background: #90a4ae; cursor: not-allowed; }
.countdown { font-size: 1em; color: #1976d2; font-weight: 700; }
.msg-hint   { font-size: .94em; color: #444; }
.msg-ok     { color: #4caf50; font-size: .95em; font-weight: 700; }
.msg-err    { color: #f44336; font-size: .95em; font-weight: 700; }
.footer { margin-top: 18px; font-size: .88em; color: #888; }
.auto-section { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
.auto-label { font-size: .78em; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #999; margin-bottom: 6px; }
.auto-device { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.auto-device .dot { width: 9px; height: 9px; flex-shrink: 0; }
.auto-name { font-size: .92em; color: #1a1a2e; font-weight: 600; }
.auto-path { font-size: .78em; color: #999; font-family: monospace; }

/* Stream Log Box */
.stream-container { width: 100%; max-width: 960px; margin-top: 32px;
                    border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1); overflow: hidden; }
.stream-header { background: #2d3748; padding: 12px 18px; font-weight: 700;
                 font-size: .95em; color: #e2e8f0; letter-spacing: .03em; }
#log-box { height: 260px; overflow-y: auto; padding: 14px 18px;
           background: #1e1e1e; color: #d4d4d4; font-family: monospace;
           font-size: .92em; line-height: 1.55; }
.log-line { margin-bottom: 3px; word-wrap: break-word; }
.log-ts { color: #6b7280; margin-right: 8px; }
.log-primary_input { color: #ffb74d; }
.log-secondary_input { color: #64b5f6; }
.log-system { color: #81c784; }
.log-disconnected { color: #e57373; font-weight: bold; }

</style>
</head>
<body>
<h1>Input Device Management</h1>
<div id="app"></div>
<div class="footer" id="ts"></div>

<div class="stream-container">
  <div class="stream-header">Live Event Stream (/run/inputd/input.sock)</div>
  <div id="log-box"></div>
</div>

<script>
const ROLES = ['primary_input', 'secondary_input'];
const LABELS = {
  primary_input: 'Primary Input',
  secondary_input:  'Secondary Input'
};

let lastRoles = {};
let lastAuto = []; // auto-discovered devices
// learnState[role] = null | { countdown } | { done: 'ok'|'timeout' }
let learnState = {};
const learnTimers = {}; // role → intervalId for the countdown

// ── fetch helpers ──────────────────────────────────────────────────────────
async function getRoles() {
  const r = await fetch('/v1/roles');
  const j = await r.json();
  return Object.fromEntries((j.roles || []).map(x => [x.role, x]));
}

async function getAutoDiscover() {
  const r = await fetch('/v1/autodiscover');
  const j = await r.json();
  return j.auto_discovered || [];
}

async function postLearnStart(role) {
  const r = await fetch(`/v1/learn/${role}/start`, { method: 'POST' });
  return r.ok;
}

// ── render ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML =
    ROLES.map(r => cardHTML(r, lastRoles[r] || {}, lastAuto.filter(d => d.role === r))).join('');
  document.getElementById('ts').textContent =
    'Last updated: ' + new Date().toLocaleTimeString('en-US');
}

function cardHTML(role, info, autoDevices) {
  const ls = learnState[role];

  // status dot
  let dotCls, dotTitle;
  if (ls && !ls.done) {
    dotCls = 'dot-learning'; dotTitle = 'Learning';
  } else if (!info.device_id) {
    dotCls = 'dot-none'; dotTitle = 'Unassigned';
  } else if (info.online) {
    dotCls = 'dot-online'; dotTitle = 'Online';
  } else {
    dotCls = 'dot-offline'; dotTitle = 'Offline';
  }

  // device block
  let devBlock;
  if (!info.device_id) {
    devBlock = `<div class="unassigned-text">Unassigned</div>`;
  } else {
    devBlock = `<div class="device-name">${esc(info.device_id)}</div>
                <div class="device-path">${esc(info.stable_path || '')}</div>`;
  }

  // action block
  let actionBlock;
  if (ls && !ls.done) {
    actionBlock = `
      <div class="countdown">⏳ ${ls.countdown}s</div>
      <div class="msg-hint">Press any key on target keyboard</div>`;
  } else {
    let extra = '';
    if (ls?.done === 'ok')      extra = `<span class="msg-ok">✓ Success</span>`;
    if (ls?.done === 'timeout') extra = `<span class="msg-err">Timeout</span>`;
    actionBlock = `
      ${extra}
      <button class="btn btn-bind" onclick="startBind('${role}')">Re-bind</button>`;
  }

  // auto-discovered devices section
  let autoBlock = '';
  if (autoDevices && autoDevices.length > 0) {
    const rows = autoDevices.map(d => {
      const dc = d.online ? 'dot-online' : 'dot-offline';
      return `<div class="auto-device">
        <div class="dot ${dc}"></div>
        <div><div class="auto-name">${esc(d.name)}</div><div class="auto-path">${esc(d.path)}</div></div>
      </div>`;
    }).join('');
    autoBlock = `<div class="auto-section"><div class="auto-label">Remote / Auto-discovered</div>${rows}</div>`;
  }

  return `
  <div class="card card-${role}">
    <div class="card-top">
      <span class="role-label">${LABELS[role]}</span>
      <div class="dot ${dotCls}" title="${dotTitle}"></div>
    </div>
    ${devBlock}
    ${autoBlock}
    <div class="card-action">${actionBlock}</div>
  </div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── learn mode ─────────────────────────────────────────────────────────────
function clearLearnTimer(role) {
  if (learnTimers[role]) { clearInterval(learnTimers[role]); delete learnTimers[role]; }
}

async function startBind(role) {
  const ok = await postLearnStart(role).catch(() => false);
  if (!ok) { alert('Start failed, check daemon status.'); return; }

  learnState[role] = { countdown: 15 };
  render();

  // countdown; SSE role_changed fires on success (see connectStream)
  learnTimers[role] = setInterval(() => {
    if (!learnState[role] || learnState[role].done) { clearLearnTimer(role); return; }
    learnState[role].countdown--;
    render();
    if (learnState[role].countdown <= 0) {
      clearLearnTimer(role);
      learnState[role] = { done: 'timeout' };
      render();
    }
  }, 1000);
}

// expose for onclick
window.startBind = startBind;

// ── background refresh ─────────────────────────────────────────────────────
async function refresh() {
  try {
    [lastRoles, lastAuto] = await Promise.all([getRoles(), getAutoDiscover()]);
    render();
  } catch (_) {
    document.getElementById('app').innerHTML =
      '<p style="color:#f44336;text-align:center">Cannot connect to daemon</p>';
  }
}

refresh();
setInterval(refresh, 3000);

// ── event stream ───────────────────────────────────────────────────────────
const logBox = document.getElementById('log-box');
const MAX_LINES = 100;

function appendLog(jsonStr) {
  try {
    const ev = JSON.parse(jsonStr);
    const line = document.createElement('div');
    line.className = 'log-line';

    // timestamp
    const d = new Date(ev.ts);
    const tsStr = d.getHours().toString().padStart(2,'0') + ':' +
                  d.getMinutes().toString().padStart(2,'0') + ':' +
                  d.getSeconds().toString().padStart(2,'0');

    let colorClass = 'log-system';
    if (ev.kind === 'device_disconnected') colorClass = 'log-disconnected';
    else if (ev.role === 'primary_input') colorClass = 'log-primary_input';
    else if (ev.role === 'secondary_input') colorClass = 'log-secondary_input';
    else if (ev.kind === 'health') colorClass = 'log-system';

    line.innerHTML = `<span class="log-ts">[${tsStr}]</span> <span class="${colorClass}">${esc(jsonStr)}</span>`;

    logBox.appendChild(line);
    while (logBox.childNodes.length > MAX_LINES) {
      logBox.removeChild(logBox.firstChild);
    }
    logBox.scrollTop = logBox.scrollHeight;
  } catch(e) {}
}

function connectStream() {
  const sse = new EventSource('/v1/events');
  sse.onmessage = (e) => {
    appendLog(e.data);
    try {
      const ev = JSON.parse(e.data);
      // role_changed fires when learn mode binds a device (new or re-bind)
      if (ev.kind === 'role_changed' && learnState[ev.role] && !learnState[ev.role].done) {
        clearLearnTimer(ev.role);
        learnState[ev.role] = { done: 'ok' };
        refresh();
        render();
      }
    } catch (_) {}
  };
  sse.onerror = () => {
    sse.close();
    setTimeout(connectStream, 3000);
  };
}
connectStream();

</script>
</body>
</html>
